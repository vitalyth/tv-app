name: IdanPlus Apply

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y jq unzip

      # 🔥 Always verify (no dependency on check workflow)
      - name: Verify update exists
        id: verify
        run: |
          DATA=$(curl -s https://api.github.com/repos/Fishenzon/repo/contents/zips/plugin.video.idanplus)

          FILE=$(echo "$DATA" | jq -r '.[].name' | grep plugin.video.idanplus- | sort -V | tail -n 1)
          VERSION=$(echo $FILE | sed -E 's/.*-([0-9\.]+)\.zip/\1/')

          if [ -f backend/plugin_video_idanplus/addon.xml ]; then
            INSTALLED=$(grep -oP '<addon[^>]*version="\K[0-9\.]+' backend/plugin_video_idanplus/addon.xml | head -n1)
          else
            INSTALLED="none"
          fi

          echo "Installed: $INSTALLED"
          echo "Latest: $VERSION"

          if [ "$INSTALLED" = "$VERSION" ]; then
            echo "❌ No update available"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Download plugin
      - name: Download plugin
        run: |
          mkdir -p temp

          URL="https://raw.githubusercontent.com/Fishenzon/repo/master/zips/plugin.video.idanplus/plugin.video.idanplus-${{ steps.verify.outputs.version }}.zip"

          echo "Downloading $URL"
          curl -L "$URL" -o temp/plugin.zip

          unzip -o temp/plugin.zip -d temp/

          DIR=$(find temp -maxdepth 1 -type d -name "plugin.video.idanplus*" | head -n1)

          if [ -z "$DIR" ]; then
            echo "❌ Plugin folder not found"
            exit 1
          fi

          mv "$DIR" temp/plugin_video_idanplus

      # Apply update
      - name: Apply update
        run: |
          rm -rf backend/plugin_video_idanplus
          mv temp/plugin_video_idanplus backend/plugin_video_idanplus

      # Commit
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add backend
          git commit -m "Update idanplus plugin to version ${{ steps.verify.outputs.version }}" || echo "No changes"

          git push

      - name: Trigger Docker Build workflow
        run: |
          echo "Triggering Docker build..."
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-and-push.yml/dispatches \
            -d '{"ref":"main"}'