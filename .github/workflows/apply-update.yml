name: Apply IdanPlus Update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Ensure structure exists
        run: |
          mkdir -p backend/temp backend/old
          [ -f backend/active_version.txt ] || echo "none" > backend/active_version.txt

      # 🔐 validation
      - name: Validate READY
        run: |
          if [ ! -f backend/temp/READY ]; then
            echo "❌ No READY file"
            exit 1
          fi

          if [ ! -d backend/temp/plugin_video_idanplus ]; then
            echo "❌ Missing folder"
            exit 1
          fi

      - name: Read current version
        id: version
        run: |
          VERSION=$(cat backend/active_version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 📦 backup
      - name: Backup current version
        run: |
          if [ -d backend/plugin_video_idanplus ]; then
            zip -r backend/old/plugin_video_idanplus_${{ steps.version.outputs.version }}.zip backend/plugin_video_idanplus
          fi

      - name: Apply new version
        run: |
          rm -rf backend/plugin_video_idanplus
          mv backend/temp/plugin_video_idanplus backend/plugin_video_idanplus

      - name: Update active version
        run: |
          cp backend/current_version.txt backend/active_version.txt

      - name: Cleanup temp
        run: rm -rf backend/temp

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backend
          git commit -m "Apply idanplus version $(cat backend/active_version.txt)" || echo "No changes"
          git push