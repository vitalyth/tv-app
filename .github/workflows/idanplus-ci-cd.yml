name: IdanPlus CI/CD Pipeline

on:
  schedule:
    - cron: "0 6,18 * * *"

  workflow_dispatch:
    inputs:
      apply:
        description: "Run apply update (only if new version exists)"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  # =========================
  # CHECK
  # =========================
  check:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y jq unzip

      - id: get_file
        run: |
          DATA=$(curl -s https://api.github.com/repos/Fishenzon/repo/contents/zips/plugin.video.idanplus)
          FILE=$(echo "$DATA" | jq -r '.[].name' | grep plugin.video.idanplus- | sort -V | tail -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - id: version
        run: |
          FILE=${{ steps.get_file.outputs.file }}
          VERSION=$(echo $FILE | sed -E 's/.*-([0-9\.]+)\.zip/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: compare
        run: |
          NEW="${{ steps.version.outputs.version }}"

          if [ -f backend/plugin_video_idanplus/addon.xml ]; then
            INSTALLED=$(grep -oP '<addon[^>]*version="\K[0-9\.]+' backend/plugin_video_idanplus/addon.xml | head -n1)
          else
            INSTALLED="none"
          fi

          echo "Installed: $INSTALLED"
          echo "New: $NEW"

          if [ "$INSTALLED" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download plugin
        if: ${{ steps.compare.outputs.changed == 'true' }}
        run: |
          mkdir -p temp
          FILE=${{ steps.get_file.outputs.file }}
          URL="https://raw.githubusercontent.com/Fishenzon/repo/master/zips/plugin.video.idanplus/$FILE"

          curl -L "$URL" -o temp/$FILE
          unzip -o temp/$FILE -d temp/

          DIR=$(find temp -maxdepth 1 -type d -name "plugin.video.idanplus*" | head -n1)
          mv "$DIR" temp/plugin_video_idanplus

      - uses: actions/upload-artifact@v4
        if: ${{ steps.compare.outputs.changed == 'true' }}
        with:
          name: idanplus-plugin
          path: temp

  # =========================
  # APPLY (MANUAL CONTROL)
  # =========================
  apply:
    needs: check
    runs-on: ubuntu-latest

    # 🔒 STRICT CONTROL
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.apply == 'true' &&
      needs.check.result == 'success' &&
      needs.check.outputs.changed == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: idanplus-plugin
          path: temp

      - name: Validate
        run: |
          echo "Running apply..."
          echo "Version: ${{ needs.check.outputs.version }}"

      - name: Apply update
        run: |
          rm -rf backend/plugin_video_idanplus

          if [ -d temp/plugin_video_idanplus ]; then
            mv temp/plugin_video_idanplus backend/plugin_video_idanplus
          else
            mkdir -p backend/plugin_video_idanplus
            cp -r temp/* backend/plugin_video_idanplus/
          fi

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add backend
          git commit -m "Update idanplus to ${{ needs.check.outputs.version }}" || echo "No changes"
          git push