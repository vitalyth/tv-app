name: IdanPlus Check

on:
  # Run automatically twice a day
  schedule:
    - cron: "0 6,18 * * *"

  # Allow manual run if needed
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v5

      # Install jq
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      # Get latest version from source repo
      - name: Get latest version
        id: version
        run: |
          DATA=$(curl -s https://api.github.com/repos/Fishenzon/repo/contents/zips/plugin.video.idanplus)

          FILE=$(echo "$DATA" | jq -r '.[].name' \
            | grep plugin.video.idanplus- \
            | sort -V \
            | tail -n 1)

          VERSION=$(echo $FILE | sed -E 's/.*-([0-9\.]+)\.zip/\1/')

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Compare installed vs latest
      - name: Compare versions
        id: compare
        run: |
          NEW="${{ steps.version.outputs.version }}"

          if [ -f backend/plugin_video_idanplus/addon.xml ]; then
            INSTALLED=$(grep -oP '<addon[^>]*version="\K[0-9\.]+' backend/plugin_video_idanplus/addon.xml | head -n1)
          else
            INSTALLED="none"
          fi

          echo "Installed version: $INSTALLED"
          echo "Latest version: $NEW"

          if [ "$INSTALLED" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Pretty UI summary in GitHub Actions
      - name: Write summary
        run: |
          if [ "${{ steps.compare.outputs.changed }}" = "true" ]; then
            echo "## 🚨 New version available: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Already up to date" >> $GITHUB_STEP_SUMMARY
          fi

      # 📧 Send email if update found
      - name: Send email if update found
        if: ${{ steps.compare.outputs.changed == 'true' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "🚨 New IdanPlus Version Available"
          body: |
            A new IdanPlus version was detected!

            Version: ${{ steps.version.outputs.version }}

            Go to GitHub Actions:
            https://github.com/${{ github.repository }}/actions

            Then run: IdanPlus Apply
          to: ${{ secrets.EMAIL_TO }}
          from: IdanPlus Bot <${{ secrets.EMAIL_USER }}>
