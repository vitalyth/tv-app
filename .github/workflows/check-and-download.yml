name: Check and Download IdanPlus

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq unzip

      # 🔥 הכל בתוך backend
      - name: Ensure structure exists
        run: |
          mkdir -p backend/temp backend/old

          [ -f backend/current_version.txt ] || echo "none" > backend/current_version.txt
          [ -f backend/active_version.txt ] || echo "none" > backend/active_version.txt
          [ -f backend/current_file.txt ] || echo "none" > backend/current_file.txt

      - name: Get latest zip file
        id: get_file
        run: |
          DATA=$(curl -s https://api.github.com/repos/Fishenzon/repo/contents/zips/plugin.video.idanplus)
          FILE=$(echo "$DATA" | jq -r '.[].name' | grep plugin.video.idanplus- | sort -V | tail -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ No file found"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          FILE=${{ steps.get_file.outputs.file }}
          VERSION=$(echo $FILE | sed -E 's/.*-([0-9\.]+)\.zip/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read active version
        id: active
        run: |
          ACTIVE=$(cat backend/active_version.txt)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check_version
        run: |
          ACTIVE="${{ steps.active.outputs.active }}"
          NEW="${{ steps.version.outputs.version }}"

          if [ "$ACTIVE" = "none" ] || [ "$ACTIVE" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract
        if: steps.check_version.outputs.changed == 'true'
        run: |
          FILE=${{ steps.get_file.outputs.file }}
          URL="https://raw.githubusercontent.com/Fishenzon/repo/master/zips/plugin.video.idanplus/$FILE"

          rm -rf backend/temp/*
          mkdir -p backend/temp

          curl -L "$URL" -o backend/temp/$FILE
          unzip -o backend/temp/$FILE -d backend/temp/

          mv backend/temp/plugin.video.idanplus backend/temp/plugin_video_idanplus || true

      # 🔥 הוספת __init__.py
      - name: Add __init__.py
        if: steps.check_version.outputs.changed == 'true'
        run: |
          touch backend/temp/plugin_video_idanplus/__init__.py

      - name: Remove zip
        if: steps.check_version.outputs.changed == 'true'
        run: rm -f backend/temp/*.zip

      - name: Save metadata
        if: steps.check_version.outputs.changed == 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > backend/current_version.txt
          echo "${{ steps.get_file.outputs.file }}" > backend/current_file.txt

      - name: Mark READY
        if: steps.check_version.outputs.changed == 'true'
        run: echo "ready $(date)" > backend/temp/READY

      - name: Commit changes
        if: steps.check_version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backend
          git commit -m "New idanplus version ${{ steps.version.outputs.version }}" || echo "No changes"
          git push