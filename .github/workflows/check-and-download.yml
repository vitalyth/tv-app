name: Check and Download IdanPlus

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq unzip

      # 🔥 INIT - יצירת מבנה אם חסר
      - name: Ensure structure exists
        run: |
          mkdir -p temp old

          [ -f current_version.txt ] || echo "none" > current_version.txt
          [ -f active_version.txt ] || echo "none" > active_version.txt
          [ -f current_file.txt ] || echo "none" > current_file.txt

      - name: Get latest zip file
        id: get_file
        run: |
          DATA=$(curl -s https://api.github.com/repos/Fishenzon/repo/contents/zips/plugin.video.idanplus)
          FILE=$(echo "$DATA" | jq -r '.[].name' | grep plugin.video.idanplus- | sort -V | tail -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ No valid file found"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          FILE=${{ steps.get_file.outputs.file }}
          VERSION=$(echo $FILE | sed -E 's/.*-([0-9\.]+)\.zip/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read active version
        id: active
        run: |
          ACTIVE=$(cat active_version.txt)
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check_version
        run: |
          ACTIVE="${{ steps.active.outputs.active }}"
          NEW="${{ steps.version.outputs.version }}"

          echo "Active: $ACTIVE"
          echo "New: $NEW"

          if [ "$ACTIVE" = "none" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$ACTIVE" = "$NEW" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Download and extract
        if: steps.check_version.outputs.changed == 'true'
        run: |
          FILE=${{ steps.get_file.outputs.file }}
          URL="https://raw.githubusercontent.com/Fishenzon/repo/master/zips/plugin.video.idanplus/$FILE"

          rm -rf temp/*
          mkdir -p temp

          curl -L "$URL" -o temp/$FILE
          unzip -o temp/$FILE -d temp/

          mv temp/plugin.video.idanplus temp/plugin_video_idanplus || true

      - name: Validate extraction
        if: steps.check_version.outputs.changed == 'true'
        run: |
          if [ ! -d temp/plugin_video_idanplus ]; then
            echo "❌ Extraction failed"
            exit 1
          fi

      - name: Remove zip
        if: steps.check_version.outputs.changed == 'true'
        run: rm -f temp/*.zip

      - name: Save metadata
        if: steps.check_version.outputs.changed == 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > current_version.txt
          echo "${{ steps.get_file.outputs.file }}" > current_file.txt

          echo "Version: ${{ steps.version.outputs.version }}" > temp/info.txt
          echo "Downloaded: $(date)" >> temp/info.txt

      - name: Mark READY
        if: steps.check_version.outputs.changed == 'true'
        run: echo "ready $(date)" > temp/READY

      # 🔔 summary
      - name: Summary
        run: |
          echo "### IdanPlus Check" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changed: ${{ steps.check_version.outputs.changed }}" >> $GITHUB_STEP_SUMMARY

      - name: Commit changes
        if: steps.check_version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "New idanplus version ${{ steps.version.outputs.version }}" || echo "No changes"
          git push