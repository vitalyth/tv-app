#version: "3.8"

services:
  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    container_name: nextjs
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - ROOT_PATH=/api
    volumes:
      - ./backend/cache:/app/cache
    container_name: fastapi
    restart: unless-stopped

  backend-scheduler:
    build: ./backend
    command: ["python", "run_scheduler.py"]
    environment:
      - EPG_INTERVAL_SECONDS=${EPG_INTERVAL_SECONDS:-86400}
      - VOD_RECENT_INTERVAL_SECONDS=${VOD_RECENT_INTERVAL_SECONDS:-43200}
    volumes:
      - ./backend/cache:/app/cache
    container_name: fastapi-scheduler
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
