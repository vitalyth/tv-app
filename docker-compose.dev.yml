# Dev compose with Surfshark VPN for VOD only.
# The regular backend handles live/EPG/local app traffic.
# The backend-vpn service shares gluetun's network namespace, and nginx routes
# only VOD API/proxy endpoints to it through http://gluetun:8002.

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-dev
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=surfshark
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=Israel
      - TZ=America/New_York
      - HTTP_CONTROL_SERVER=off
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    container_name: nextjs-vpn-dev
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - ROOT_PATH=/api
      - BACKEND_CACHE_DIR=/app/cache
      - KAN_VOD_DB_PATH=/app/db/kan_vod.db
      - LOCAL_SERIES_DB_PATH=/app/db/local_series.db
      - LOCAL_SERIES_WATCHER_ENABLED=${LOCAL_SERIES_WATCHER_ENABLED:-true}
      - LOCAL_SERIES_WATCH_INTERVAL_SECONDS=${LOCAL_SERIES_WATCH_INTERVAL_SECONDS:-2}
      - KAN_VOD_RETRIES=${KAN_VOD_RETRIES:-3}
      - KAN_VOD_STREAM_BATCH_SIZE=${KAN_VOD_STREAM_BATCH_SIZE:-20}
      - LOCAL_VOD_TV_DIR=${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_LANGUAGE=${TMDB_LANGUAGE:-he-IL}
    volumes:
      - ./backend/cache:/app/cache
      - kan-vod-db-dev:/app/db
      - ${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}:${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}:ro
    container_name: fastapi-dev
    restart: unless-stopped

  backend-vpn:
    build: ./backend
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002"]
    environment:
      - ROOT_PATH=/api
      - BACKEND_CACHE_DIR=/app/cache
      - KAN_VOD_DB_PATH=/app/db/kan_vod.db
      - LOCAL_SERIES_DB_PATH=/app/db/local_series.db
      - KAN_VOD_RETRIES=${KAN_VOD_RETRIES:-3}
      - KAN_VOD_STREAM_BATCH_SIZE=${KAN_VOD_STREAM_BATCH_SIZE:-20}
      - LOCAL_VOD_TV_DIR=${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_LANGUAGE=${TMDB_LANGUAGE:-he-IL}
    volumes:
      - ./backend/cache:/app/cache
      - kan-vod-db-dev:/app/db
      - ${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}:${LOCAL_VOD_TV_DIR:-/Users/vitalythirulnikov/projects/tv-app/.docker/local-tv}:ro
    network_mode: "service:gluetun"
    container_name: fastapi-vod-vpn-dev
    restart: unless-stopped
    depends_on:
      - gluetun

  backend-scheduler:
    build: ./backend
    command: ["python", "/app/run_scheduler.py"]
    environment:
      - EPG_INTERVAL_SECONDS=${EPG_INTERVAL_SECONDS:-86400}
      - VOD_RECENT_INTERVAL_SECONDS=${VOD_RECENT_INTERVAL_SECONDS:-43200}
      - KAN_VOD_SCAN_INTERVAL_SECONDS=${KAN_VOD_SCAN_INTERVAL_SECONDS:-28800}
      - BACKEND_CACHE_DIR=/app/cache
      - KAN_VOD_DB_PATH=/app/db/kan_vod.db
    volumes:
      - ./backend/cache:/app/cache
      - kan-vod-db-dev:/app/db
    container_name: fastapi-scheduler-dev
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: nginx-vpn-dev
    ports:
      - "8001:80"
    depends_on:
      - frontend
      - backend
      - backend-vpn

volumes:
  kan-vod-db-dev:
