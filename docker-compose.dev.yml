#version: "3.8"

services:
  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    container_name: nextjs
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - ROOT_PATH=/api
    container_name: fastapi
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend