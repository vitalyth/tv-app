events {}

http {
  proxy_buffering off;
  proxy_request_buffering off;
  proxy_max_temp_file_size 0;
  resolver 127.0.0.11 valid=30s ipv6=off;

  map $arg_url $api_proxy_upstream {
    default backend:8000;
    ~*(kan|kancdn|kan11|cdn-redge|redge\.media|kan\.org\.il|mobapi\.kan\.org\.il) gluetun:8002;
  }

  server {
    listen 80;

    # Frontend
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # VOD API through VPN
    location = /api/vod_channels {
      proxy_pass http://gluetun:8002/vod_channels;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/vod_recent {
      proxy_pass http://gluetun:8002/vod_recent;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/vod_items {
      proxy_pass http://gluetun:8002/vod_items;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/kan-vod {
      proxy_pass http://gluetun:8002/kan-vod;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/vod_stream {
      proxy_pass http://gluetun:8002/vod_stream;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # VOD streaming proxy through VPN
    location = /api/vod_proxy {
      proxy_pass http://gluetun:8002/proxy;
      proxy_http_version 1.1;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint vod_proxy;
    }

    # Regular streaming proxy, not VPN
    location /api/proxy {
      proxy_pass http://$api_proxy_upstream/proxy$is_args$args;
      proxy_http_version 1.1;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host $api_proxy_upstream;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint proxy;
    }

    # Regular backend, not VPN
    location /api/ {
      proxy_pass http://backend:8000/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
