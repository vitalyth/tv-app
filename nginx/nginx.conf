events {}

http {
  proxy_buffering off;
  proxy_request_buffering off;
  proxy_max_temp_file_size 0;
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Route known Kan media proxy requests through the VPN backend.
  map "$arg_vpn:$arg_v:$arg_url" $api_proxy_upstream {
    default backend:8000;
    ~*^(1|true|yes|on): gluetun:8002;
    ~*^[^:]*:(1|true|yes|on): gluetun:8002;
    ~*(kan|kancdn|kan11|cdn-redge|redge\.media|kan\.org\.il|mobapi\.kan\.org\.il) gluetun:8002;
  }

  # Route Kan live channels through the VPN backend while keeping /api/stream public.
  map "$arg_vpn:$arg_v:$arg_channel_id" $api_stream_upstream {
    default backend:8000;
    ~*^(1|true|yes|on): gluetun:8002;
    ~*^[^:]*:(1|true|yes|on): gluetun:8002;
    ~*^[^:]*:[^:]*:ch_11 gluetun:8002;
  }

  # Preserve the original scheme when requests arrive through Cloudflare.
  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  server {
    listen 80;

    # Next.js frontend.
    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auto-routed stream resolver. Kan 11 channels go through VPN, others stay direct.
    location = /api/stream {
      proxy_pass http://$api_stream_upstream/stream$is_args$args;
      proxy_set_header Host $api_stream_upstream;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint proxy;
    }

    # Explicit VPN stream resolver.
    location = /api/v/stream {
      proxy_pass http://gluetun:8002/stream$is_args$args;
      proxy_http_version 1.1;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint proxy;
    }

    # Explicit VPN media proxy.
    location = /api/v/proxy {
      proxy_pass http://gluetun:8002/proxy$is_args$args;
      proxy_http_version 1.1;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host gluetun:8002;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint proxy;
    }

    # Auto-routed media proxy. Kan URLs go through VPN, other URLs stay direct.
    location = /api/proxy {
      proxy_pass http://$api_proxy_upstream/proxy$is_args$args;
      proxy_http_version 1.1;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_connect_timeout 30s;
      proxy_set_header Host $api_proxy_upstream;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proxy-Endpoint proxy;
    }

    # Default API backend. Kan VOD metadata intentionally stays here.
    location /api/ {
      proxy_pass http://backend:8000/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
