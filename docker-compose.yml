version: "3.8"

services:
  frontend:
    image: vitalyth/tv-app-frontend:latest
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    networks:
      - tv-network

  backend:
    image: vitalyth/tv-app-backend:latest
    environment:
      - ROOT_PATH=/api
      - BACKEND_CACHE_DIR=/app/cache
    volumes:
      - ${BACKEND_CACHE_DIR:-/DATA/AppData/tv-app/backend-cache}:/app/cache
    networks:
      - tv-network

  backend-scheduler:
    image: vitalyth/tv-app-backend:latest
    command: ["python", "/app/run_scheduler.py"]
    environment:
      - EPG_INTERVAL_SECONDS=${EPG_INTERVAL_SECONDS:-86400}
      - VOD_RECENT_INTERVAL_SECONDS=${VOD_RECENT_INTERVAL_SECONDS:-43200}
      - BACKEND_CACHE_DIR=/app/cache
    volumes:
      - ${BACKEND_CACHE_DIR:-/DATA/AppData/tv-app/backend-cache}:/app/cache
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tv-network

  nginx:
    image: vitalyth/tv-app-nginx:latest
    ports:
      - "8001:80"
    volumes:
      - ${NGINX_CACHE_DIR:-/DATA/AppData/tv-app/nginx-cache}:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - tv-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - nginx
    networks:
      - tv-network

networks:
  tv-network:
    driver: bridge
