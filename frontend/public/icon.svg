<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#ff3b3b"/>

  <!-- TV body -->
  <rect
    x="20"
    y="40"
    width="60"
    height="38"
    rx="10"
    fill="none"
    stroke="white"
    stroke-width="8"
  />

  <!-- Antenna (∧ connected to top) -->
  <line
    x1="35"
    y1="28"
    x2="50"
    y2="40"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />
  <line
    x1="65"
    y1="28"
    x2="50"
    y2="40"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
  />
</svg>